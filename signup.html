<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up | Y&amp;G Financial Services Private Limited</title>
    <meta name="description" content="Sign up UI for Y&G Financial Services Private Limited.">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header" data-header></header>
    <main class="auth-page">
      <form class="form-card auth-card" data-form="signup">
        <p class="eyebrow">Start planning</p>
        <h1>Sign Up</h1>
        <label>Name<input required name="name" autocomplete="name"></label>
        <label>Email<input required type="email" name="email" autocomplete="email"></label>
        <label>Phone<input required name="phone" autocomplete="tel"></label>
        <label>Password<input required type="password" name="password" autocomplete="new-password"></label>
        <button class="btn btn--gold" type="submit">Create Account</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <p class="form-note" data-form-note></p>
      </form>
    </main>
    <footer class="site-footer" data-footer></footer>
    <script src="assets/main.js"></script>
  </body>
</html>
