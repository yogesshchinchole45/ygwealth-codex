<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Y&amp;G Financial Services Private Limited</title>
    <meta name="description" content="Client login UI for Y&G Financial Services Private Limited.">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header" data-header></header>
    <main class="auth-page">
      <form class="form-card auth-card" data-form="login">
        <p class="eyebrow">Client access</p>
        <h1>Login</h1>
        <label>Email<input required type="email" name="email" autocomplete="email"></label>
        <label>Password<input required type="password" name="password" autocomplete="current-password"></label>
        <button class="btn btn--gold" type="submit">Login</button>
        <p>New to Y&amp;G? <a href="signup.html">Create an account</a></p>
        <p class="form-note" data-form-note></p>
      </form>
    </main>
    <footer class="site-footer" data-footer></footer>
    <script src="assets/main.js"></script>
  </body>
</html>
